<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skill Civilization</title>
  <link rel="stylesheet" href="splash.css">
</head>
<body>

  <div class="splash-wrapper">

    <!-- LOADING STATE -->
    <div id="loadingState" class="loading-state">
      <div class="spinner"></div>
      <p>Memuat Skill Civilization...</p>
    </div>

    <!-- MAIN SPLASH CONTENT (muncul setelah loading) -->
    <div id="splashContent" class="splash-content hidden">
      <div class="splash-logo">🏛️</div>
      <h1>SKILL <span>CIVILIZATION</span></h1>
      <p class="splash-tagline">
        Platform terintegrasi untuk pelayanan masyarakat<br>
        yang transparan, efektif, dan modern.
      </p>
      <button id="btnMasuk" class="btn-splash">Masuk / Daftar</button>
    </div>

  </div>

  <script src="splash.js"></script>
</body>
</html>
