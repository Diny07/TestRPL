<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skill Civilization — Masuk</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="auth.css">
</head>
<body>
  <div class="auth-box">
    <h1>Skill Civilization</h1>

    <div class="tabs">
      <button id="tabLogin" class="tab-btn active">Masuk</button>
      <button id="tabRegister" class="tab-btn">Daftar</button>
    </div>

    <!-- FORM LOGIN -->
    <form id="loginForm" class="auth-form">
      <input type="email" id="loginEmail" placeholder="Email" required>
      <input type="password" id="loginPassword" placeholder="Password" required>
      <button type="submit">Masuk</button>
    </form>

    <!-- FORM REGISTER -->
    <form id="registerForm" class="auth-form hidden">
      <input type="text" id="registerName" placeholder="Nama Lengkap" required>
      <input type="email" id="registerEmail" placeholder="Email" required>
      <input type="password" id="registerPassword" placeholder="Password (min 6 karakter)" required minlength="6">
      <button type="submit">Daftar</button>
    </form>

    <p id="authStatus"></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabaseClient.js"></script>
  <script src="auth.js"></script>
</body>
</html>
